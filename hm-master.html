<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハウスメーカーDB | 山寿</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
  --text: #e2e8f0; --muted: #64748b; --accent: #60a5fa;
  --green: #4ade80; --yellow: #facc15; --orange: #fb923c; --red: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,'Hiragino Sans','Yu Gothic',sans-serif; font-size: 11px; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 14px; font-weight: 700; }
#count { color: var(--muted); font-size: 11px; }
.hint { color: var(--muted); font-size: 10px; margin-left: auto; }
.filters { padding: 8px 16px; background: var(--surface); border-bottom: 2px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex-shrink: 0; }
.fg { display: flex; align-items: center; gap: 4px; }
.fg label { color: var(--muted); font-size: 10px; white-space: nowrap; }
input[type="text"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-family: inherit; width: 180px; }
select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 4px; font-size: 11px; font-family: inherit; }
input[type="number"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 6px; border-radius: 4px; font-size: 11px; font-family: inherit; width: 60px; }
.reset-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }
.table-wrap { flex: 1; overflow: auto; }
table { border-collapse: collapse; white-space: nowrap; min-width: 100%; }
thead th { background: var(--surface); border: 1px solid var(--border); padding: 6px 10px; cursor: pointer; user-select: none; font-weight: 600; color: var(--muted); font-size: 10px; position: sticky; top: 0; z-index: 2; }
thead th:hover { background: #252836; color: var(--text); }
thead th.asc::after { content: ' ↑'; color: var(--accent); }
thead th.desc::after { content: ' ↓'; color: var(--accent); }
tbody tr:hover { background: rgba(96,165,250,0.06); }
tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
td { border: 1px solid var(--border); padding: 5px 10px; vertical-align: top; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
.col-id { color: var(--muted); font-family: monospace; font-size: 10px; position: sticky; left: 0; background: var(--bg); z-index: 1; min-width: 54px; }
.col-name { font-weight: 700; position: sticky; left: 54px; background: var(--bg); z-index: 1; border-right: 2px solid var(--border) !important; min-width: 120px; }
thead th.col-id { left: 0; z-index: 3; }
thead th.col-name { left: 54px; z-index: 3; border-right: 2px solid var(--border) !important; }
tr:hover .col-id, tr:hover .col-name { background: #151824; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.badge-大手 { background: #172554; color: #93c5fd; }
.badge-中堅 { background: #14532d; color: #86efac; }
.badge-ローコスト { background: #431407; color: #fdba74; }
.badge-FC展開 { background: #2e1065; color: #c4b5fd; }
.badge-輸入住宅 { background: #500724; color: #fda4af; }
.badge-パワービルダー { background: #422006; color: #fcd34d; }
.cc { font-weight: 700; }
.cc-◎ { color: var(--green); }
.cc-○ { color: var(--yellow); }
.cc-△ { color: var(--orange); }
.cc-× { color: var(--red); }
.prec-A { color: var(--green); }
.prec-B { color: var(--yellow); }
.prec-C { color: var(--orange); }
</style>
</head>
<body>
<header>
  <h1>🏠 ハウスメーカー DB</h1>
  <span id="count">— 件表示</span>
  <span class="hint">列ヘッダーでソート　|　左2列は固定　|　横スクロールで全列表示</span>
</header>
<div class="filters">
  <div class="fg"><label>🔍 検索</label><input type="text" id="s-q" placeholder="社名・強み・特徴など…"></div>
  <div class="fg"><label>カテゴリ</label>
    <select id="s-cat">
      <option value="">すべて</option>
      <option>大手</option><option>中堅</option><option>ローコスト</option>
      <option>FC展開</option><option>輸入住宅</option><option>パワービルダー</option>
    </select>
  </div>
  <div class="fg"><label>構造</label>
    <select id="s-struct">
      <option value="">すべて</option>
      <option value="木造">木造系</option><option value="鉄骨">鉄骨系</option>
      <option value="ユニット">ユニット</option>
    </select>
  </div>
  <div class="fg"><label>断熱★以上</label>
    <select id="s-heat">
      <option value="">すべて</option>
      <option value="5">★5</option><option value="4">★4以上</option><option value="3">★3以上</option>
    </select>
  </div>
  <div class="fg"><label>坪単価下限〜</label><input type="number" id="s-pmin" placeholder="例:45"></div>
  <div class="fg"><label>〜坪単価上限</label><input type="number" id="s-pmax" placeholder="例:80"></div>
  <div class="fg"><label>設計自由度</label>
    <select id="s-design"><option value="">すべて</option><option>高</option><option>中</option><option>低</option></select>
  </div>
  <div class="fg"><label>首都圏</label>
    <select id="s-metro"><option value="">すべて</option><option>◎</option><option>○</option><option>△</option></select>
  </div>
  <div class="fg"><label>ZEH</label>
    <select id="s-zeh"><option value="">すべて</option><option>◎</option><option>○</option><option>△</option></select>
  </div>
  <button class="reset-btn" onclick="resetAll()">リセット</button>
</div>
<div class="table-wrap">
  <table>
    <thead><tr id="thead-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

let data = RAW.map(r => Object.fromEntries(COLS.map((c,i)=>[c.k, r[i]||''])));
let filtered = [...data];
let sortKey = null, sortDir = 1;

function buildHeader() {
  const tr = document.getElementById('thead-row');
  COLS.forEach(c => {
    const th = document.createElement('th');
    if (c.cls) th.className = c.cls;
    th.textContent = c.l;
    th.addEventListener('click', () => doSort(c.k));
    tr.appendChild(th);
  });
}

function doSort(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  filtered.sort((a,b) => {
    const av = isNaN(a[key]) ? a[key] : +a[key];
    const bv = isNaN(b[key]) ? b[key] : +b[key];
    return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
  });
  renderTable();
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('asc','desc'));
  const idx = COLS.findIndex(c=>c.k===key);
  document.querySelectorAll('thead th')[idx]?.classList.add(sortDir===1?'asc':'desc');
}

function stars(n) {
  return '<span style="color:#fbbf24">' + '★'.repeat(+n) + '</span><span style="color:#374151">' + '☆'.repeat(5-(+n)) + '</span>';
}

function fmt(val, col) {
  if (!val || val==='-') return '<span style="color:#374151">—</span>';
  if (col==='url') return `<a href="${val}" target="_blank" rel="noopener">開く ↗</a>`;
  if (col==='cat') return `<span class="badge badge-${val}">${val}</span>`;
  if (col==='heat') return stars(val);
  if (col==='zeh' || col==='metro') return `<span class="cc cc-${val}">${val}</span>`;
  if (col==='prec') return `<span class="prec-${val}">${val}</span>`;
  return val;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  filtered.forEach(row => {
    const tr = document.createElement('tr');
    COLS.forEach(c => {
      const td = document.createElement('td');
      if (c.cls) td.className = c.cls;
      td.innerHTML = fmt(row[c.k], c.k);
      td.title = row[c.k];
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  document.getElementById('count').textContent = `35社 中 ${filtered.length}件表示`;
}

function applyFilters() {
  const q = document.getElementById('s-q').value.toLowerCase();
  const cat = document.getElementById('s-cat').value;
  const struct = document.getElementById('s-struct').value;
  const heat = document.getElementById('s-heat').value;
  const pmin = document.getElementById('s-pmin').value;
  const pmax = document.getElementById('s-pmax').value;
  const design = document.getElementById('s-design').value;
  const metro = document.getElementById('s-metro').value;
  const zeh = document.getElementById('s-zeh').value;

  filtered = data.filter(r => {
    if (q && !Object.values(r).join(' ').toLowerCase().includes(q)) return false;
    if (cat && r.cat !== cat) return false;
    if (struct && !r.struct.includes(struct)) return false;
    if (heat && +r.heat < +heat) return false;
    if (pmin && +r.pmin < +pmin) return false;
    if (pmax && +r.pmin > +pmax) return false;
    if (design && r.design !== design) return false;
    if (metro && r.metro !== metro) return false;
    if (zeh && r.zeh !== zeh) return false;
    return true;
  });
  renderTable();
}

function resetAll() {
  ['s-q','s-cat','s-struct','s-heat','s-pmin','s-pmax','s-design','s-metro','s-zeh'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
  });
  filtered = [...data];
  renderTable();
}

['s-q','s-cat','s-struct','s-heat','s-pmin','s-pmax','s-design','s-metro','s-zeh'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
  document.getElementById(id).addEventListener('change', applyFilters);
});

buildHeader();
renderTable();
</script>
